name: Telegram Bot Poll

# Poll Telegram every 5 minutes (GitHub minimum). Replaces local server.js bot polling.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: telegram-bot-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Poll Telegram & process messages
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PAGES_URL: https://yashb042.github.io/Personal-Tracker/
        run: node scripts/telegram-tracker.mjs poll

      - name: Commit data changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: sync tracker data from Telegram bot'
          file_pattern: 'data/*.json'
