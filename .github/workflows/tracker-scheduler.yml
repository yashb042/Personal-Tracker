name: Tracker Scheduled Reminders

# All cron jobs from server.js — runs on GitHub even when your laptop is off.
on:
  schedule:
    # 8:00 AM IST = 02:30 UTC — daily tracking prompt
    - cron: '30 2 * * *'
    # Hourly nags 9 AM–10 PM IST = 03:30–16:30 UTC
    - cron: '30 3-16 * * *'
    # Wednesday 8 PM IST = 14:30 UTC
    - cron: '30 14 * * 3'
    # Friday 8 PM IST = 14:30 UTC
    - cron: '30 14 * * 5'
    # Sunday 10:30 PM IST = 17:00 UTC
    - cron: '0 17 * * 0'
    # Random midday ~1 PM IST = 07:30 UTC
    - cron: '30 7 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run (daily-prompt, hourly-nag, midweek, friday, sunday, midday)'
        required: true
        default: 'daily-prompt'

permissions:
  contents: write

jobs:
  run-scheduled-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine job from cron or manual input
        id: job
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.job }}" >> $GITHUB_OUTPUT
            exit 0
          fi
          CRON="${{ github.event.schedule }}"
          case "$CRON" in
            "30 2 * * *") echo "name=daily-prompt" >> $GITHUB_OUTPUT ;;
            "30 3-16 * * *") echo "name=hourly-nag" >> $GITHUB_OUTPUT ;;
            "30 14 * * 3") echo "name=midweek" >> $GITHUB_OUTPUT ;;
            "30 14 * * 5") echo "name=friday" >> $GITHUB_OUTPUT ;;
            "0 17 * * 0") echo "name=sunday" >> $GITHUB_OUTPUT ;;
            "30 7 * * *") echo "name=midday" >> $GITHUB_OUTPUT ;;
            *) echo "name=hourly-nag" >> $GITHUB_OUTPUT ;;
          esac

      - name: Run tracker job
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PAGES_URL: https://yashb042.github.io/Personal-Tracker/
        run: node scripts/telegram-tracker.mjs ${{ steps.job.outputs.name }}

      - name: Commit data changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: sync tracker data from scheduled job'
          file_pattern: 'data/*.json'
