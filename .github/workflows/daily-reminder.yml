name: Daily Tracker Reminder

on:
  schedule:
    # 10 PM IST = 4:30 PM UTC
    - cron: '30 16 * * *'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Reminder
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Target date: July 31, 2026
          TARGET_EPOCH=$(date -d "2026-07-31 23:59:59" +%s 2>/dev/null || date -j -f "%Y-%m-%d %H:%M:%S" "2026-07-31 23:59:59" +%s)
          NOW_EPOCH=$(date +%s)
          DAYS_LEFT=$(( (TARGET_EPOCH - NOW_EPOCH) / 86400 ))
          if [ "$DAYS_LEFT" -lt 0 ]; then DAYS_LEFT=0; fi

          # Theme rotation (changes every 3 days)
          DAY_OF_YEAR=$(date +%j | sed 's/^0*//')
          THEME_INDEX=$(( (DAY_OF_YEAR / 3) % 8 ))

          case $THEME_INDEX in
            0) THEME="🔥 BEAST MODE: You have ${DAYS_LEFT} days till July 31. Every rep counts." ;;
            1) THEME="⚡ NO EXCUSES: Champions don't skip. ${DAYS_LEFT} days left." ;;
            2) THEME="💀 DISCIPLINE > MOTIVATION: ${DAYS_LEFT} days. Are you earning your body?" ;;
            3) THEME="🏆 FUTURE YOU will thank PRESENT YOU. ${DAYS_LEFT} days remaining." ;;
            4) THEME="🥊 PAIN IS TEMPORARY, PRIDE IS FOREVER. ${DAYS_LEFT} days to go." ;;
            5) THEME="🚀 SHOW UP. EVERY. DAMN. DAY. ${DAYS_LEFT} days till July 31." ;;
            6) THEME="⛰️ THE GRIND DOESN'T QUIT — and neither do you. ${DAYS_LEFT} days left." ;;
            7) THEME="🦁 HUNT YOUR GOAL. ${DAYS_LEFT} days remaining. Stay savage." ;;
          esac

          # Random motivation from the pool
          MOTIVATIONS=(
            "You paid for that gym membership. Use it or lose it."
            "Excuses don't burn calories. Move."
            "Skipping today is stealing from tomorrow's you."
            "Comfort is a slow death. Get up."
            "Stop scrolling. Start sweating."
            "Soft choices today, soft body tomorrow."
            "Your muscles are filing a missing person report."
            "Your dumbbells are gathering dust and judging you."
            "Even your couch is asking for a day off from you."
            "Your protein shake is single and looking for a workout."
            "Plot twist: the gym actually exists when you go."
            "30 minutes. That's it. You spend more time on Instagram."
            "Discipline is choosing between what you want now and what you want most."
            "You don't rise to the level of your goals. You fall to the level of your systems."
            "The pain of discipline weighs ounces. The pain of regret weighs tons."
            "Someone out there is training while you're on the couch. Catch up."
            "Every day you skip, someone else is gaining ground."
            "There's a version of you out there who didn't quit. Be him."
            "You are what you repeatedly do. Right now, what are you?"
            "Champions show up on the days they don't feel like it."
            "Nobody's going to do this for you. Get up."
            "You're not tired. You're undisciplined. There's a difference."
            "The gym doesn't care about your mood. Go anyway."
            "Pretty soon 'one day' becomes 'never'."
            "What you do today echoes through your next decade."
          )
          RANDOM_INDEX=$(( RANDOM % ${#MOTIVATIONS[@]} ))
          MOTIVATION="${MOTIVATIONS[$RANDOM_INDEX]}"

          # Build message
          MESSAGE="${THEME}

${MOTIVATION}

📋 *Log your day:* https://yashb042.github.io/Personal-Tracker/

🛏️ Sleep time • ⏰ Wake up • 🏋️ Gym • 🏃 Sport • 📖 Reading"

          # Send via Telegram Bot API
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MESSAGE}" \
            -d parse_mode="Markdown" \
            -o /dev/null -w "%{http_code}"
